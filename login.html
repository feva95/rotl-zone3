<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Server 84</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #1a0033 0%, #330066 50%, #1a0033 100%);
      min-height: 100vh;
      color: #fff;
    }
    
    .form-container {
      max-width: 450px;
      margin: 80px auto;
      padding: 40px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    h2 {
      color: #fff;
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
    }
    
    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
    }
    
    input::placeholder {
      color: rgba(255, 255, 255, 0.5);    }
    
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00d9ff, #7b2cbf);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      margin: 10px 0;
      font-size: 16px;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 217, 255, 0.3);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
    }
    
    a {
      color: #00d9ff;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-top: 15px;
    }
    
    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
    }
    
    .alert-success {
      background: rgba(40, 167, 69, 0.2);
      color: #28a745;
    }
    
    .alert-error {
      background: rgba(220, 53, 69, 0.2);
      color: #dc3545;
    }
  </style>
</head><body>
  <div class="form-container">
    <h2>Login to Server 84</h2>
    
    <div id="alertBox"></div>
    
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="btn">Login</button>
      <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">← Back to Home</button>
      <a href="login.html" onclick="toggleForm(); return false;">Need an account? Sign Up</a>
    </form>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        await signInWithEmailAndPassword(auth, email, password);
        showAlert('✅ Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      } catch (error) {
        showAlert('❌ ' + error.message, 'error');
      }
    });
    
    function showAlert(message, type) {
      const alertBox = document.getElementById('alertBox');
      alertBox.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
      setTimeout(() => {
        alertBox.innerHTML = '';
      }, 5000);
    }
  </script>
</body>
</html>
