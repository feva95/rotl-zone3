<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Server 84</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">Server 84</div>
    <div>
      <a href="index.html">Home</a>
    </div>
  </nav>

  <!-- Login Form -->
  <div class="form-container">
    <h2>Login to Server 84</h2>
    
    <div id="alertBox"></div>
    
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      
      <button type="submit" class="btn">Login</button>
      <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">← Back to Home</button>
      
      <a href="login.html" onclick="showSignup(); return false;">Need an account? Sign Up</a>
    </form>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    // Login Form Submit
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showAlert('✅ Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      } catch (error) {
        showAlert('❌ ' + error.message, 'error');
      }
    });

    // Show alert function
    function showAlert(message, type) {
      const alertBox = document.getElementById('alertBox');
      alertBox.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
      setTimeout(() => {
        alertBox.innerHTML = '';
      }, 5000);
    }

    // Show signup toggle
    window.showSignup = function() {
      window.location.href = 'login.html'; // Change to signup.html if you have it
    };
  </script>

</body>
</html>
