<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Server 84</title>
  <link rel="stylesheet" href="css/style.css?v=2">
  <style>
    .form-container {
      max-width: 400px;
      margin: 100px auto;
      padding: 30px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-secondary {
      background: #6c757d;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
      font-size: 14px;
    }
    .role-disabled {
      color: #999;
      background: #f0f0f0;
    }    /* Auto-close Alert */
    .alert {
      padding: 15px;
      border-radius: 5px;
      margin: 10px 0;
      animation: slideIn 0.3s ease;
    }
    .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2 id="formTitle">Login</h2>
    
    <div id="alertBox"></div>
    
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    
    <!-- Signup Only Fields -->
    <div id="signupFields" style="display: none;">
      <select id="alliance" required>
        <option value="">Select Your Alliance</option>
        <option value="ROTL">ROTL</option>
        <option value="COZY">COZY</option>
        <option value="SS">SS</option>
        <option value="N4US">N4US</option>
        <option value="VIP">VIP</option>
      </select>
      
      <input type="text" id="inGameName" placeholder="In-Game Name">
      <input type="text" id="playerId" placeholder="Commander ID">
      
      <select id="roleClaim" required>
        <option value="">Select Role</option>
        <option value="R1">R1 - Recruit</option>
        <option value="R2">R2 - Member</option>
        <option value="R3">R3 - Veteran</option>
        <option value="R4">R4 - Officer</option>
        <option value="R5" id="r5Option">R5 - Leader</option>
      </select>
    </div>
    
    <!-- Remember Me -->    <div class="remember-me">
      <input type="checkbox" id="rememberMe" style="width: auto; margin: 0;">
      <label for="rememberMe" style="margin: 0;">Remember me</label>
    </div>
    
    <button id="authBtn" class="btn">Login</button>
    <button class="btn btn-secondary" onclick="window.location.href='index.html'" style="margin-top: 10px;">← Back to Home</button>
    
    <p style="margin-top: 20px; text-align: center;">
      <a href="#" id="toggleForm">Need an account? Sign Up</a>
    </p>
  </div>

  <script type="module">
    import { auth, db } from './js/firebase-config.js';
    import { signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { doc, setDoc, getDocs, collection, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const authBtn = document.getElementById('authBtn');
    const toggleForm = document.getElementById('toggleForm');
    const formTitle = document.getElementById('formTitle');
    const signupFields = document.getElementById('signupFields');
    const r5Option = document.getElementById('r5Option');
    let isLogin = true;

    // Check if already logged in (Remember Me)
    auth.onAuthStateChanged((user) => {
      if (user) {
        // Check if "remember me" was set
        if (localStorage.getItem('rememberMe') === 'true') {
          window.location.href = 'dashboard.html';
        }
      }
    });

    // Toggle Login/Signup
    toggleForm.addEventListener('click', async (e) => {
      e.preventDefault();
      isLogin = !isLogin;
      formTitle.innerText = isLogin ? 'Login' : 'Sign Up';
      authBtn.innerText = isLogin ? 'Login' : 'Sign Up';
      toggleForm.innerText = isLogin ? 'Need an account? Sign Up' : 'Already have an account? Login';
      signupFields.style.display = isLogin ? 'none' : 'block';
      
      // Check R5 availability when alliance changes
      if (!isLogin) {
        await checkR5Availability();
      }
    });
    // Check if R5 slot is taken for selected alliance
    async function checkR5Availability() {
      const alliance = document.getElementById('alliance').value;
      if (!alliance) return;
      
      try {
        const q = query(collection(db, "users"), 
          where("allianceId", "==", alliance),
          where("role", "==", "R5"),
          where("status", "==", "verified")
        );
        const snapshot = await getDocs(q);
        
        if (!snapshot.empty) {
          // R5 already exists
          r5Option.disabled = true;
          r5Option.classList.add('role-disabled');
          r5Option.text = 'R5 - Leader (Already Taken)';
          showAlert('⚠️ R5 position is already filled for ' + alliance, 'error');
        } else {
          r5Option.disabled = false;
          r5Option.classList.remove('role-disabled');
          r5Option.text = 'R5 - Leader';
        }
      } catch (error) {
        console.error('Error checking R5:', error);
      }
    }

    // Listen for alliance change
    document.getElementById('alliance').addEventListener('change', checkR5Availability);

    // Handle Submit
    authBtn.addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      if (!email || !password) {
        showAlert('❌ Please fill in all fields', 'error');
        return;
      }

      try {
        if (isLogin) {
          // LOGIN
          await signInWithEmailAndPassword(auth, email, password);
          
          // Remember me
          if (rememberMe) {            localStorage.setItem('rememberMe', 'true');
            localStorage.setItem('userEmail', email);
          } else {
            localStorage.removeItem('rememberMe');
            localStorage.removeItem('userEmail');
          }
          
          showAlert('✅ Login successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1500);
          
        } else {
          // SIGNUP
          const alliance = document.getElementById('alliance').value;
          const inGameName = document.getElementById('inGameName').value;
          const playerId = document.getElementById('playerId').value;
          const roleClaim = document.getElementById('roleClaim').value;

          if (!alliance || !inGameName || !playerId || !roleClaim) {
            showAlert('❌ Please fill in all fields', 'error');
            return;
          }

          // Check R5 again before submitting
          if (roleClaim === 'R5') {
            const q = query(collection(db, "users"), 
              where("allianceId", "==", alliance),
              where("role", "==", "R5"),
              where("status", "==", "verified")
            );
            const snapshot = await getDocs(q);
            if (!snapshot.empty) {
              showAlert('❌ R5 position is already taken for ' + alliance, 'error');
              return;
            }
          }

          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          const user = userCredential.user;
          await sendEmailVerification(user);

          const verificationCode = generateVerificationCode(alliance);

          await setDoc(doc(db, "users", user.uid), {
            email: email,
            allianceId: alliance,
            role: "R0",
            roleClaim: roleClaim,
            status: "pending",            inGameName: inGameName,
            playerId: playerId,
            verificationCode: verificationCode,
            codeExpiresAt: new Date(Date.now() + 48 * 60 * 60 * 1000).toISOString(),
            createdAt: new Date().toISOString(),
            lastLogin: new Date().toISOString(),
            websiteLogins: 1,
            lilies: 0,
            bronze: 0,
            silver: 0,
            gold: 0,
            allianceCoins: 0,
            pin: null // For future PIN feature
          });

          showAlert(`✅ Account created! Verification code: ${verificationCode}`, 'success');
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 3000);
        }
      } catch (error) {
        showAlert('❌ ' + error.message, 'error');
      }
    });

    // Generate verification code
    function generateVerificationCode(alliance) {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 4; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return `${alliance}-${code}`;
    }

    // Auto-close alert function
    function showAlert(message, type) {
      const alertBox = document.getElementById('alertBox');
      alertBox.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
      
      // Auto-close after 5 seconds
      setTimeout(() => {
        alertBox.innerHTML = '';
      }, 5000);
    }
  </script>
</body>
</html>
