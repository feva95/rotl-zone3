<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Server 84</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: linear-gradient(135deg, #1a0033, #330066); min-height: 100vh; color: #fff; }
    .form-container { max-width: 450px; margin: 80px auto; padding: 40px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
    h2 { color: #fff; text-align: center; margin-bottom: 30px; }
    input { width: 100%; padding: 14px; margin: 10px 0; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; }
    .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #00d9ff, #7b2cbf); border: none; border-radius: 10px; color: #fff; font-weight: 600; cursor: pointer; margin: 10px 0; }
    .btn-secondary { background: rgba(255,255,255,0.1); }
    a { color: #00d9ff; display: block; text-align: center; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Login to Server 84</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="btn">Login</button>
      <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">← Back to Home</button>
      <a href="signup.html">Need an account? Sign Up</a>
    </form>
  </div>
  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (error) {
        alert('Error: ' + error.message);
      }
    });
  </script>
</body>
</html>
