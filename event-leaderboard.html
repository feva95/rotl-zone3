<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Leaderboard - Server 84</title>
  <link rel="stylesheet" href="css/style.css?v=2">
  <style>
    .leaderboard-container {
      max-width: 1000px;
      margin: 80px auto 20px;
      padding: 20px;
    }
    .filter-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-tab {
      flex: 1;
      min-width: 100px;
      padding: 12px 15px;
      background: white;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      text-align: center;
    }
    .filter-tab.active {
      background: #007bff;
      color: white;
      border-color: #007bff;
    }
    .event-card {
      background: white;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .event-header {
      background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
      color: white;
      padding: 20px;
    }
    .event-header.ar { background: linear-gradient(135deg, #ff6b6b 0%, #c92a2a 100%); }
    .event-header.ir { background: linear-gradient(135deg, #ffd43b 0%, #f08c00 100%); }
    .event-header.gw { background: linear-gradient(135deg, #51cf66 0%, #2b8a3e 100%); }    .event-title { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
    .event-meta { font-size: 13px; opacity: 0.9; }
    .event-body { padding: 20px; }
    
    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin: 25px 0 15px;
      padding-bottom: 10px;
      border-bottom: 3px solid #007bff;
    }
    .section-title.showdown { border-color: #9b59b6; color: #9b59b6; }
    .section-title.rotl { border-color: #28a745; color: #28a745; }
    
    /* Alliance Comparison Table */
    .alliance-table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    .alliance-table th {
      background: #f8f9fa;
      padding: 12px;
      text-align: left;
      border-bottom: 2px solid #ddd;
    }
    .alliance-table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }
    .rank-1 { background: #ffd700; font-weight: bold; }
    .rank-2 { background: #c0c0c0; font-weight: bold; }
    .rank-3 { background: #cd7f32; color: white; font-weight: bold; }
    
    .alliance-ROTL { color: #28a745; font-weight: bold; }
    .alliance-COZY { color: #ff6b6b; font-weight: bold; }
    .alliance-SS { color: #333; font-weight: bold; }
    .alliance-N4US { color: #007bff; font-weight: bold; }
    .alliance-VIP { color: #9b59b6; font-weight: bold; }
    
    /* ROTL Rankings */
    .rankings-table {
      width: 100%;
      border-collapse: collapse;
    }
    .rankings-table th {
      background: #f8f9fa;
      padding: 12px;
      text-align: left;
      border-bottom: 2px solid #ddd;    }
    .rankings-table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }
    
    .loading { text-align: center; padding: 40px; color: #666; }
    
    @media (max-width: 600px) {
      .alliance-table, .rankings-table { font-size: 11px; }
      .alliance-table th, .alliance-table td { padding: 8px 4px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">🏆 Server 84 Leaderboard</div>
    <button id="backBtn" class="btn btn-secondary">← Back</button>
  </nav>

  <div class="leaderboard-container">
    <h1>Event Rankings</h1>
    <p style="color: #666; margin-bottom: 20px;">Server 84 Top 5 Alliances Competition</p>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <div class="filter-tab active" onclick="filterEvents('all')">📊 All</div>
      <div class="filter-tab" onclick="filterEvents('AR')">🏝️ AR</div>
      <div class="filter-tab" onclick="filterEvents('IR')">⚔️ IR</div>
      <div class="filter-tab" onclick="filterEvents('GW')">👑 GW</div>
    </div>

    <!-- Events List -->
    <div id="eventsList">
      <div class="loading">Loading events...</div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from './js/firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { collection, query, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    let allEvents = [];
    let currentFilter = 'all';
    const ALLIANCES = ['ROTL', 'COZY', 'SS', 'N4US', 'VIP'];

    onAuthStateChanged(auth, () => {
      loadEvents();    });

    // Load all events
    async function loadEvents() {
      try {
        const eventsRef = collection(db, "events");
        const q = query(eventsRef, orderBy("submittedAt", "desc"));
        const snapshot = await getDocs(q);
        
        allEvents = [];
        snapshot.forEach(doc => {
          allEvents.push({ id: doc.id, ...doc.data() });
        });
        
        renderEvents();
      } catch (error) {
        console.error("Error:", error);
        document.getElementById('eventsList').innerHTML = '<p>Error loading events.</p>';
      }
    }

    // Filter events
    window.filterEvents = function(type) {
      currentFilter = type;
      document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');
      renderEvents();
    };

    // Render events
    function renderEvents() {
      const container = document.getElementById('eventsList');
      let filtered = currentFilter === 'all' ? allEvents : allEvents.filter(e => e.eventType === currentFilter);
      
      if (filtered.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: #666;">No events found.</p>';
        return;
      }
      
      container.innerHTML = filtered.map(event => createEventCard(event)).join('');
    }

    // Create event card
    function createEventCard(event) {
      const headerClass = event.eventType.toLowerCase();
      const eventName = event.eventName || 'Unknown Event';
      const eventDate = event.eventDate ? new Date(event.eventDate).toLocaleDateString() : 'Unknown';
      
      // Get Top 3 from each alliance
      const top3ByAlliance = getTop3ByAlliance(event.rankings || []);      
      // Calculate alliance scores and rank
      const allianceScores = ALLIANCES.map(alliance => {
        const players = top3ByAlliance[alliance] || [];
        const total = players.reduce((sum, p) => sum + p.points, 0);
        return { alliance, total, players };
      }).sort((a, b) => b.total - a.total);
      
      // Get ROTL rankings for rewards
      const rotlRankings = (event.rankings || [])
        .filter(r => r.isROTL)
        .sort((a, b) => b.points - a.points);
      
      return `
        <div class="event-card">
          <div class="event-header ${headerClass}">
            <div class="event-title">${eventName}</div>
            <div class="event-meta">📅 ${eventDate} • 🏷️ ${event.eventType}</div>
          </div>
          
          <div class="event-body">
            
            <!-- Alliance Showdown -->
            <div class="section-title showdown">🤝 Server 84 Alliance Rankings</div>
            <table class="alliance-table">
              <thead>
                <tr>
                  <th>Rank</th>
                  <th>Alliance</th>
                  <th>Top 3 Total Points</th>
                  <th>Top Players</th>
                </tr>
              </thead>
              <tbody>
                ${allianceScores.map((a, i) => `
                  <tr class="${i < 3 ? 'rank-' + (i+1) : ''}">
                    <td>#${i + 1}</td>
                    <td class="alliance-${a.alliance}">${a.alliance}</td>
                    <td><strong>${formatPoints(a.total)}</strong></td>
                    <td>${a.players.slice(0, 3).map(p => `${p.inGameName} (${formatPoints(p.points)})`).join(', ') || 'No data'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
            
            <!-- ROTL Internal Rankings -->
            <div class="section-title rotl">✅ ROTL Member Rankings (For Rewards)</div>
            ${rotlRankings.length > 0 ? `
              <table class="rankings-table">
                <thead>                  <tr>
                    <th>#</th>
                    <th>Player</th>
                    <th>Points</th>
                    <th>Rewards</th>
                  </tr>
                </thead>
                <tbody>
                  ${rotlRankings.slice(0, 10).map((r, i) => `
                    <tr class="${i < 3 ? 'rank-' + (i+1) : ''}">
                      <td>${i + 1}</td>
                      <td>${r.inGameName}</td>
                      <td>${formatPoints(r.points)}</td>
                      <td>${getRewards(i + 1)}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            ` : '<p style="color: #999;">No ROTL members in this event.</p>'}
            
          </div>
        </div>
      `;
    }

    // Get Top 3 from each alliance
    function getTop3ByAlliance(rankings) {
      const result = {};
      ALLIANCES.forEach(a => result[a] = []);
      
      rankings.forEach(r => {
        const alliance = r.alliance || 'Unknown';
        if (ALLIANCES.includes(alliance) && result[alliance].length < 3) {
          result[alliance].push(r);
        }
      });
      
      // Sort each alliance by points
      ALLIANCES.forEach(a => {
        result[a].sort((x, y) => y.points - x.points);
      });
      
      return result;
    }

    // Format points
    function formatPoints(points) {
      if (points >= 1000000) return (points / 1000000).toFixed(1) + 'M';
      if (points >= 1000) return (points / 1000).toFixed(0) + 'K';
      return points.toLocaleString();    }

    // Get rewards
    function getRewards(rank) {
      const rewards = {
        1: '🥇 50G, 100S, 5🪙',
        2: '🥈 30G, 50S, 3🪙',
        3: '🥉 15G, 25S, 2🪙',
      };
      return rewards[rank] || '🎁 Participation';
    }

    // Back button
    document.getElementById('backBtn').addEventListener('click', () => {
      window.history.back();
    });
  </script>
</body>
</html>
