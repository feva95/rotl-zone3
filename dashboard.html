<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Server 84</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">Server 84</div>
    <button onclick="logout()" class="btn btn-secondary">Logout</button>
  </nav>

  <div class="dashboard-container">
    <div class="welcome-header">
      <h1>Welcome, Commander!</h1>
    </div>

    <div class="status-card">
      <h2>📋 Account Status</h2>
      <div class="status-info">
        <div class="status-item">
          <div class="status-label">Email</div>
          <div class="status-value" id="userEmail">Loading...</div>
        </div>
        <div class="status-item">
          <div class="status-label">Alliance</div>
          <div class="status-value" id="userAlliance">Loading...</div>
        </div>
        <div class="status-item">
          <div class="status-label">In-Game Name</div>
          <div class="status-value" id="userIgn">Loading...</div>
        </div>
        <div class="status-item">
          <div class="status-label">Rank</div>
          <div class="status-value" id="userRank">Loading...</div>
        </div>
        <div class="status-item">
          <div class="status-label">Status</div>
          <div class="status-value" id="userStatus">⏳ Pending Verification</div>
        </div>
      </div>
    </div>

    <div class="verified-badge">
      <h2>✅ Account Verified!</h2>
      <p>Welcome to the alliance! You now have full access to all features.</p>
      <a href="alliance-dashboard.html" class="cta-button">Go to Alliance Dashboard</a>
    </div>
  </div>

  <script type="module">
    import { auth, db } from './js/firebase-config.js';
    import { signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          const data = userDoc.data();
          document.getElementById('userEmail').textContent = user.email;
          document.getElementById('userAlliance').textContent = data.allianceId || 'N/A';
          document.getElementById('userIgn').textContent = data.inGameName || 'N/A';
          document.getElementById('userRank').textContent = `${data.role} - ${getRoleName(data.role)}`;
          document.getElementById('userStatus').textContent = data.status === 'verified' ? '✅ Verified' : '⏳ Pending Verification';
        }
      }
    });

    function getRoleName(role) {
      const roles = { 'R0': 'Enrollment', 'R1': 'Recruit', 'R2': 'Member', 'R3': 'Veteran', 'R4': 'Officer', 'R5': 'Leader' };
      return roles[role] || role;
    }

    window.logout = () => {
      signOut(auth).then(() => window.location.href = 'index.html');
    };
  </script>
</body>
  </html>
